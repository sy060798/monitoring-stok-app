<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Produk</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BODY */
body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    height:100vh;
    background:#0f172a;
    color:#fff;
    position:fixed;
    left:0;
    top:0;
    padding:20px;
    overflow-y:auto;
}

.sidebar h2{
    margin-bottom:25px;
    font-size:24px;
}

.sidebar a{
    display:block;
    color:#cbd5e1;
    padding:12px;
    text-decoration:none;
    border-radius:8px;
    margin-bottom:8px;
}

.sidebar a:hover{
    background:#1e293b;
}

.sidebar a.active{
    background:#2563eb;
    color:#fff;
}

/* MAIN */
.main{
    margin-left:250px;
    width:calc(100% - 250px);
    padding:25px;
}

/* TOPBAR */
.topbar{
    background:#fff;
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

/* SEARCH */
.search-box{
    margin-bottom:20px;
}

.search-box input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

/* CARD */
.card{
    background:#fff;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
    position:relative;
}

.card h3{
    margin-bottom:10px;
}

/* BUTTON */
button{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-right:5px;
}

.btn-edit{
    background:#f59e0b;
    color:#fff;
}

.btn-delete{
    background:#ef4444;
    color:#fff;
}

/* ICON BUTTON AREA */
.action{
    margin-top:10px;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#fff;
    padding:20px;
    border-radius:10px;
    width:300px;
}

.modal-content input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

.modal-content button{
    width:100%;
    padding:10px;
}

/* RESPONSIVE */
@media(max-width:768px){
    .sidebar{
        width:200px;
    }
    .main{
        margin-left:200px;
        width:calc(100% - 200px);
    }
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>STOK APP</h2>

    <a href="index.html">📊 Dashboard</a>
    <a class="active" href="produk.html">📦 Produk</a>
    <a href="input.html">➕ Input</a>
    <a href="laporan.html">📈 Laporan</a>
    <a href="setting.html">⚙️ Setting</a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <h1>Produk</h1>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
        <input type="text" id="search" placeholder="🔍 Cari produk...">
    </div>

    <!-- LIST -->
    <div id="listProduk" class="grid"></div>

</div>

<!-- MODAL EDIT -->
<div class="modal" id="modalEdit">

    <div class="modal-content">

        <h3>Edit Produk</h3>

        <input type="hidden" id="editSku">

        <input type="text" id="editNama" placeholder="Nama">
        <input type="number" id="editModal" placeholder="Modal">
        <input type="number" id="editHarga" placeholder="Harga Jual">
        <input type="number" id="editStok" placeholder="Stok">
        <input type="number" id="editTerjual" placeholder="Terjual">

        <button onclick="simpanEdit()">Simpan</button>
        <button onclick="closeModal()">Tutup</button>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/core.js"></script>
<script src="js/produk.js"></script>

</body>
</html>
