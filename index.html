<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Monitoring Stok App</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6f9;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  height: 100vh;
  background: #111827;
  color: white;
  padding: 20px;
  position: fixed;
}

.sidebar .logo {
  margin-bottom: 30px;
}

.sidebar nav a {
  display: block;
  color: #ccc;
  padding: 10px;
  text-decoration: none;
  margin-bottom: 5px;
  border-radius: 6px;
}

.sidebar nav a:hover {
  background: #1f2937;
  color: white;
}

.sidebar nav a.active {
  background: #2563eb;
  color: white;
}

/* MAIN */
.main {
  margin-left: 240px;
  padding: 20px;
  width: 100%;
}

/* TOPBAR */
.topbar {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

/* PANEL */
.panel {
  background: white;
  padding: 20px;
  margin-top: 20px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

/* RESPONSIVE (LAPTOP ONLY FOCUS) */
@media (max-width: 1200px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <h2>STOK APP</h2>
  </div>

  <nav>
    <a class="active" href="index.html">📊 Dashboard</a>
    <a href="produk.html">📦 Produk</a>
    <a href="input.html">➕ Input</a>
    <a href="laporan.html">📈 Laporan</a>
    <a href="setting.html">⚙️ Setting</a>
  </nav>
</aside>

<!-- MAIN -->
<main class="main">

  <div class="topbar">
    <h1>Dashboard</h1>
  </div>

  <div class="grid">

    <div class="card">
      <h3>Total Produk</h3>
      <p id="totalProduk">0</p>
    </div>

    <div class="card">
      <h3>Total Stok</h3>
      <p id="totalStok">0</p>
    </div>

    <div class="card">
      <h3>Total Profit</h3>
      <p id="totalProfit">Rp 0</p>
    </div>

  </div>

  <div class="panel">
    <h3>Ringkasan Sistem</h3>
    <p>Sistem monitoring stok aktif berjalan.</p>
  </div>

</main>

<!-- JS -->
<script src="js/dashboard.js"></script>

</body>
</html>
