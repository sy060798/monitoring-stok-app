<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}
.sidebar{width:250px;height:100vh;background:#0f172a;color:#fff;position:fixed;padding:20px}
.sidebar a{display:block;color:#cbd5e1;padding:10px;text-decoration:none;border-radius:8px;margin-bottom:6px}
.sidebar a:hover{background:#1e293b}
.sidebar a.active{background:#2563eb;color:#fff}

.main{margin-left:250px;padding:25px}
.topbar{background:#fff;padding:15px;border-radius:12px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.panel{background:#fff;margin-top:20px;padding:20px;border-radius:12px}
</style>
</head>

<body>

<div class="sidebar">
<h2>STOK APP</h2>
<a class="active" href="index.html">📊 Dashboard</a>
<a href="produk.html">📦 Produk</a>
<a href="input.html">➕ Input</a>
<a href="laporan.html">📈 Laporan</a>
<a href="setting.html">⚙️ Setting</a>
</div>

<div class="main">
<div class="topbar"><h1>Dashboard</h1></div>

<div class="grid">
<div class="card"><h3>Total Produk</h3><p id="totalProduk">0</p></div>
<div class="card"><h3>Total Stok</h3><p id="totalStok">0</p></div>
<div class="card"><h3>Total Profit</h3><p id="totalProfit">Rp 0</p></div>
</div>

<div class="panel">
<h3>Ringkasan Sistem</h3>
<p>Sistem monitoring stok aktif berjalan.</p>
</div>
</div>

<script src="js/dashboard.js"></script>

</body>
</html>
