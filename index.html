<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>

/* ===== RESET ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* ===== BODY ===== */
body{
    font-family:Arial,sans-serif;
    background:#f1f5f9;
    display:flex;
    color:#1e293b;
}

/* ===== SIDEBAR ===== */
.sidebar{
    width:250px;
    height:100vh;
    background:#0f172a;
    position:fixed;
    left:0;
    top:0;
    padding:25px 18px;
}

.sidebar h2{
    color:#fff;
    margin-bottom:30px;
    font-size:26px;
}

.sidebar a{
    display:block;
    text-decoration:none;
    color:#cbd5e1;
    padding:14px;
    border-radius:10px;
    margin-bottom:10px;
    transition:.2s;
}

.sidebar a:hover{
    background:#1e293b;
    color:#fff;
}

.sidebar a.active{
    background:#2563eb;
    color:#fff;
}

/* ===== MAIN ===== */
.main{
    margin-left:250px;
    width:calc(100% - 250px);
    padding:25px;
}

/* ===== TOPBAR ===== */
.topbar{
    background:#fff;
    padding:22px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 4px 15px rgba(0,0,0,.05);
}

.topbar h1{
    font-size:30px;
}

/* ===== GRID ===== */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:18px;
}

/* ===== CARD ===== */
.card{
    background:#fff;
    padding:22px;
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,.05);
    display:flex;
    align-items:center;
    gap:18px;
}

.card-icon{
    width:65px;
    height:65px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    color:#fff;
}

.bg-blue{
    background:#2563eb;
}

.bg-green{
    background:#16a34a;
}

.bg-orange{
    background:#ea580c;
}

.card-info h3{
    font-size:15px;
    color:#64748b;
    margin-bottom:5px;
}

.card-info p{
    font-size:28px;
    font-weight:bold;
}

/* ===== MOVING ===== */
.list-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin-top:20px;
}

.list-box{
    background:#fff;
    border-radius:16px;
    padding:20px;
    box-shadow:0 4px 15px rgba(0,0,0,.05);
}

.list-box h3{
    margin-bottom:15px;
}

/* ===== ITEM ===== */
.item{
    padding:12px;
    background:#f8fafc;
    border-radius:10px;
    margin-bottom:10px;
}

.profit{
    color:#16a34a;
    font-weight:bold;
    margin-top:5px;
}

.promo{
    color:#ef4444;
    font-size:13px;
    margin-top:5px;
}

/* ===== RESPONSIVE ===== */
@media(max-width:1100px){

    .list-grid{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">

    <h2>STOK APP</h2>

    <a class="active" href="index.html">
        📊 Dashboard
    </a>

    <a href="produk.html">
        📦 Produk
    </a>

    <a href="input.html">
        ➕ Input
    </a>

    <a href="laporan.html">
        📈 Laporan
    </a>

    <a href="setting.html">
        ⚙️ Setting
    </a>

</div>

<!-- ===== MAIN ===== -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar">

        <h1>Dashboard Monitoring</h1>

    </div>

    <!-- CARD -->
    <div class="grid">

        <!-- TOTAL PRODUK -->
        <div class="card">

            <div class="card-icon bg-blue">
                📦
            </div>

            <div class="card-info">

                <h3>Total Produk</h3>

                <p id="totalProduk">0</p>

            </div>

        </div>

        <!-- TOTAL TERJUAL -->
        <div class="card">

            <div class="card-icon bg-green">
                🚚
            </div>

            <div class="card-info">

                <h3>Total Terjual</h3>

                <p id="totalTerjual">0</p>

            </div>

        </div>

        <!-- TOTAL PROFIT -->
        <div class="card">

            <div class="card-icon bg-orange">
                💰
            </div>

            <div class="card-info">

                <h3>Total Profit</h3>

                <p id="totalProfit">Rp 0</p>

            </div>

        </div>

    </div>

    <!-- MOVING -->
    <div class="list-grid">

        <!-- FAST -->
        <div class="list-box">

            <h3>🔥 Fast Moving</h3>

            <div id="fastMoving"></div>

        </div>

        <!-- MEDIUM -->
        <div class="list-box">

            <h3>⚡ Medium Moving</h3>

            <div id="mediumMoving"></div>

        </div>

        <!-- SLOW -->
        <div class="list-box">

            <h3>🐢 Slow Moving</h3>

            <div id="slowMoving"></div>

        </div>

    </div>

</div>

<!-- ===== SCRIPT ===== -->
<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
