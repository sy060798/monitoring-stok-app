<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<title>Setting</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BODY */
body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    height:100vh;
    background:#0f172a;
    color:#fff;
    position:fixed;
    left:0;
    top:0;
    padding:20px;
    overflow-y:auto;
}

.sidebar h2{
    margin-bottom:25px;
    font-size:24px;
}

.sidebar a{
    display:block;
    color:#cbd5e1;
    padding:12px;
    text-decoration:none;
    border-radius:8px;
    margin-bottom:8px;
    transition:0.3s;
}

.sidebar a:hover{
    background:#1e293b;
}

.sidebar a.active{
    background:#2563eb;
    color:#fff;
}

/* MAIN */
.main{
    margin-left:250px;
    width:calc(100% - 250px);
    padding:25px;
}

/* TITLE */
.main h1{
    margin-bottom:20px;
    font-size:28px;
}

/* FORM */
.form{
    background:#fff;
    padding:25px;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    gap:15px;
    max-width:500px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

/* INPUT */
input{
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

/* BUTTON */
button{
    padding:12px;
    background:#0f172a;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    transition:0.3s;
}

button:hover{
    background:#1e293b;
}

/* RESPONSIVE */
@media(max-width:768px){

    .sidebar{
        width:200px;
    }

    .main{
        margin-left:200px;
        width:calc(100% - 200px);
    }

}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h2>STOK APP</h2>

    <a href="index.html">📊 Dashboard</a>

    <a href="produk.html">📦 Produk</a>

    <a href="input.html">➕ Input</a>

    <a href="laporan.html">📈 Laporan</a>

    <a class="active" href="setting.html">
        ⚙️ Setting
    </a>

</div>

<!-- MAIN -->
<div class="main">

    <h1>Setting PPN</h1>

    <div class="form">

        <!-- PPN INPUT -->
        <input
            id="ppn"
            type="number"
            placeholder="PPN (%)"
        >

        <!-- SAVE PPN -->
        <button id="btnSaveSetting">
            Save PPN
        </button>

        <!-- APPLY PPN FULL UPDATE -->
        <button id="btnApplyAll">
            Apply PPN Ke Semua Produk
        </button>

        <!-- 🔥 TAMBAHAN BARU -->
        <button id="btnUpdateHarga">
            Update Harga Jual Saja
        </button>

    </div>

</div>

<!-- SCRIPT -->
<script src="js/api.js"></script>
<script src="js/setting.js"></script>

</body>
</html>
