<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laporan Stok</title>

<style>

/* =========================
   RESET
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* =========================
   BODY
========================= */
body{
    font-family:Arial, sans-serif;
    background:#f1f5f9;
    display:flex;
    color:#0f172a;
}

/* =========================
   SIDEBAR
========================= */
.sidebar{
    width:250px;
    height:100vh;
    background:#0f172a;
    position:fixed;
    left:0;
    top:0;
    padding:20px;
    overflow-y:auto;
}

.sidebar h2{
    color:#fff;
    margin-bottom:30px;
    font-size:24px;
}

.sidebar a{
    display:block;
    text-decoration:none;
    color:#cbd5e1;
    padding:14px;
    border-radius:10px;
    margin-bottom:10px;
    transition:.3s;
    font-size:15px;
}

.sidebar a:hover{
    background:#1e293b;
}

.sidebar a.active{
    background:#2563eb;
    color:#fff;
}

/* =========================
   MAIN
========================= */
.main{
    margin-left:250px;
    width:calc(100% - 250px);
    padding:25px;
}

/* =========================
   HEADER
========================= */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    flex-wrap:wrap;
    gap:15px;
}

.topbar h1{
    font-size:28px;
}

/* =========================
   SEARCH
========================= */
.search-box{
    width:320px;
}

.search-box input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
    outline:none;
    font-size:14px;
}

/* =========================
   GRID CARD
========================= */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
    margin-bottom:25px;
}

.card{
    background:#fff;
    border-radius:16px;
    padding:22px;
    box-shadow:0 4px 15px rgba(0,0,0,.05);
}

.card h3{
    font-size:15px;
    color:#64748b;
    margin-bottom:12px;
}

.card p{
    font-size:30px;
    font-weight:bold;
    color:#2563eb;
}

/* =========================
   TABLE
========================= */
.table-container{
    background:#fff;
    border-radius:18px;
    padding:20px;
    overflow:auto;
    box-shadow:0 4px 15px rgba(0,0,0,.05);
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:700px;
}

thead{
    background:#f8fafc;
}

th{
    padding:16px;
    text-align:left;
    color:#475569;
    font-size:14px;
}

td{
    padding:16px;
    border-top:1px solid #e2e8f0;
    font-size:14px;
}

/* =========================
   STATUS
========================= */
.status{
    padding:8px 14px;
    border-radius:999px;
    font-size:12px;
    font-weight:bold;
    display:inline-block;
}

.status.lama{
    background:#fee2e2;
    color:#dc2626;
}

.status.baru{
    background:#dcfce7;
    color:#16a34a;
}

/* =========================
   EMPTY
========================= */
.empty{
    text-align:center;
    padding:30px;
    color:#94a3b8;
}

/* =========================
   RESPONSIVE
========================= */
@media(max-width:768px){

    .sidebar{
        width:200px;
    }

    .main{
        margin-left:200px;
        width:calc(100% - 200px);
        padding:18px;
    }

    .topbar{
        flex-direction:column;
        align-items:flex-start;
    }

    .search-box{
        width:100%;
    }

}

</style>
</head>

<body>

<!-- =========================
     SIDEBAR
========================= -->
<div class="sidebar">

    <h2>STOK APP</h2>

    <a href="index.html">📊 Dashboard</a>

    <a href="produk.html">📦 Produk</a>

    <a href="input.html">➕ Input</a>

    <a class="active" href="laporan.html">
        📈 Laporan
    </a>

    <a href="setting.html">⚙️ Setting</a>

</div>

<!-- =========================
     MAIN
========================= -->
<div class="main">

    <!-- HEADER -->
    <div class="topbar">

        <h1>Laporan Stok</h1>

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="Cari SKU atau nama produk..."
            >

        </div>

    </div>

    <!-- CARD -->
    <div class="grid">

        <div class="card">
            <h3>Total Produk</h3>
            <p id="totalProduk">0</p>
        </div>

        <div class="card">
            <h3>Total Stok</h3>
            <p id="totalStok">0</p>
        </div>

        <div class="card">
            <h3>Total Terjual</h3>
            <p id="totalTerjual">0</p>
        </div>

    </div>

    <!-- TABLE -->
    <div class="table-container">

        <table>

            <thead>

                <tr>

                    <th>SKU</th>

                    <th>Produk</th>

                    <th>Status</th>

                    <th>Stok</th>

                    <th>Terjual</th>

                    <th>Sisa</th>

                </tr>

            </thead>

            <tbody id="dashboardBody">

                <tr>

                    <td colspan="6" class="empty">
                        Belum ada data produk
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<!-- SCRIPT -->
<script src="js/api.js"></script>
<script src="js/core.js"></script>
<script src="js/laporan.js"></script>

</body>
</html>
